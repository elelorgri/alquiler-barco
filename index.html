<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alquiler de Barco</title>
    <style>
        /* Estilos generales: limpios y profesionales */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            background-color: #f4f6f8;
        }
        
        /* Cabecera con la foto del atardecer (encuadre superior) */
        .hero {
            background-image: url('foto atardecer.jpeg'); 
            background-size: cover;
            background-position: center 20%; 
            height: 55vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            box-shadow: inset 0 0 0 1000px rgba(0,0,0,0.35); 
        }
        .hero h1 {
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .hero p {
            font-size: 1.4rem;
            margin-top: 10px;
            font-weight: 300;
        }

        /* Contenedor principal */
        .content {
            max-width: 900px;
            margin: -50px auto 50px auto; 
            padding: 40px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative;
        }

        /* Características esenciales */
        .features {
            list-style: none;
            padding: 0;
            font-size: 1.2rem;
            line-height: 2;
            text-align: center;
            margin: 20px 0 40px 0;
        }
        .features li {
            margin-bottom: 12px;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 12px;
        }
        .features li strong {
            color: #002244; 
            text-transform: uppercase;
            font-size: 0.9em;
            margin-right: 10px;
        }

        /* Sección de la Galería de Fotos */
        .gallery-title {
            text-align: center;
            color: #002244;
            margin-top: 40px;
            margin-bottom: 25px;
            text-transform: uppercase;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }
        .gallery-grid {
            display: grid;
            /* Crea columnas automáticas que se adaptan al tamaño de pantalla */
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .gallery-item {
            width: 100%;
            height: 220px;
            object-fit: cover; /* Evita que las fotos se deformen si tienen proporciones distintas */
            border-radius: 6px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.04);
            transition: transform 0.2s ease;
        }
        .gallery-item:hover {
            transform: scale(1.02); /* Efecto sutil al pasar el ratón */
        }

        /* Botón de contacto */
        .cta-container {
            text-align: center;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eeeeee;
        }
        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            text-decoration: none;
            padding: 16px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            display: inline-block;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.25);
        }
        .btn-whatsapp:hover {
            background-color: #128C7E;
            transform: scale(1.03);
        }
    </style>
</head>
<body>

    <div class="hero">
        <div>
            <h1>Alquiler de Barco</h1>
            <p>Disfruta del mar a tu medida</p>
        </div>
    </div>

    <div class="content">
        <h2 style="text-align: center; color: #002244; margin-top: 0; font-size: 1.6rem;">Detalles de la Embarcación</h2>
        <ul class="features">
            <li><strong>Capacidad:</strong> Hasta 5 personas</li>
            <li><strong>Servicio:</strong> Disponible con y sin patrón</li>
        </ul>
        
        <h3 class="gallery-title">Galería de Imágenes</h3>
        <div class="gallery-grid">
            <img src="foto.jpeg" alt="Vista general del barco" class="gallery-item">
            <img src="foto otra.jpeg" alt="Detalle de la cubierta" class="gallery-item">
            <img src="fotito.jpeg" alt="Espacio de asientos" class="gallery-item">
        </div>

        <div class="cta-container">
            <p style="margin-bottom: 25px; font-size: 1.1rem; color: #555;">¿Quieres consultar disponibilidad o tienes alguna duda?</p>
            <a href="https://wa.me/34659212978" class="btn-whatsapp" target="_blank">Contactar por WhatsApp</a>
        </div>
    </div>

</body>
</html>
